<!DOCTYPE html>
<html>

<head>
    <title>quote machine</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta http-equiv="x-ua-compatible" content="ie=edge">


    <link rel="stylesheet" type="text/css" href="style.css" />
    <script
  src="https://code.jquery.com/jquery-3.1.1.min.js"
  integrity="sha256-hVVnYaiADRTO2PzUGmuLJr8BLUSjGIZsDYGmIJLv2b8="
  crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Plus+Jakarta+Sans:wght@500;700&display=swap" rel="stylesheet">

</head>

<body>

    <main class="app-shell">
        <div class="bg-layer"></div>
        <section class="quote-stage">
            <p class="eyebrow">Quote Machine</p>

            <p id="quote">Get a quote with the button or press space</p>

            <article class="author-card">
                <img id="authorAvatar" src="" alt="" />
                <div class="author-meta">
                    <p id="quoted">Unknown</p>
                    <p id="authorOccupation">Thinker</p>
                </div>
                <a id="authorLink" class="author-link" href="#" target="_blank" rel="noopener noreferrer" aria-label="Learn more about this quote">↗</a>
            </article>

            <div class="actions">
                <a id="share" target="_blank" class="twitter-share-button button-nice button-secondary" href="https://twitter.com/intent/tweet?text=">Share on X (T)</a>
                <button class="button-nice" id="getQuoteButton">Generate Quote (Space)</button>
            </div>
        </section>
    </main>

    <script src="app.js" ></script>
    <script>
      (() => {
        const namespace = "felip-eu-portfolio";
        const activeBucketMs = 10000;
        const trimmed = (window.location.pathname || "/").replace(/\/index\.html$/, "/").replace(/\/+/g, "/");
        const route = trimmed === "" || trimmed === "/" ? "/" : trimmed.endsWith("/") ? trimmed : `${trimmed}/`;
        const counter = route === "/" ? "home" : route.replace(/^\/|\/$/g, "").toLowerCase().replace(/[^a-z0-9/_-]+/g, "-").replace(/\//g, "__");
        const activeCounter = `${counter}__active`;
        let activeStartedAt = document.visibilityState === "visible" ? Date.now() : 0;
        let activeCarryMs = 0;
        let activeTimer = null;

        function ping(name) {
          fetch(
            "https://api.counterapi.dev/v1/" +
              encodeURIComponent(namespace) +
              "/" +
              encodeURIComponent(name) +
              "/up",
            { method: "GET", keepalive: true }
          ).catch(() => {});
        }

        function flush(finalize = false) {
          if (!activeStartedAt) return;
          const now = Date.now();
          activeCarryMs += Math.max(0, now - activeStartedAt);
          activeStartedAt = now;

          while (activeCarryMs >= activeBucketMs) {
            ping(activeCounter);
            activeCarryMs -= activeBucketMs;
          }

          if (finalize && activeCarryMs >= activeBucketMs / 2) {
            ping(activeCounter);
            activeCarryMs = 0;
          }
        }

        function stop(finalize = false) {
          flush(finalize);
          activeStartedAt = 0;
          if (activeTimer) {
            clearInterval(activeTimer);
            activeTimer = null;
          }
        }

        function start() {
          if (document.visibilityState !== "visible" || activeTimer) return;
          activeStartedAt = Date.now();
          activeTimer = setInterval(() => flush(false), activeBucketMs);
        }

        document.addEventListener("visibilitychange", () => {
          if (document.visibilityState === "hidden") {
            stop(true);
            return;
          }

          start();
        });

        window.addEventListener("pagehide", () => stop(true));

        ping(counter);
        start();
      })();
    </script>
</body>

</html>
